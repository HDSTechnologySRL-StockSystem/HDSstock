<div id="qr-modal" onclick="if(event.target===this)closeQR()">
  <div class="qr-box">
    <div class="qr-title">QR de producto</div>
    <div class="qr-product-name" id="qr-pname">—</div>
    <div class="qr-meta-row" id="qr-meta-row"></div>
    <div class="qr-canvas-wrap">
      <div id="qr-canvas-inner"></div>
    </div>
    <div class="qr-label-strip" id="qr-label-strip"></div>
    <div class="qr-actions">
      <button class="qr-btn qr-btn-print" onclick="printQR()">
        <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimir
      </button>
      <button class="qr-btn qr-btn-export" onclick="exportQR()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar PNG
      </button>
    </div>
    <button class="qr-close" onclick="closeQR()">Cerrar</button>
  </div>
</div>
